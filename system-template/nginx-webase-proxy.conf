# 在服务器的 Nginx 配置中添加以下内容
# 文件位置：/etc/nginx/sites-enabled/system-template.conf

# 在 server 块中添加：

# WeBase 区块链平台代理
location /webase/ {
    # 代理到 ngrok 地址
    proxy_pass https://hitchily-nonemancipative-lizeth.ngrok-free.dev/;

    # 设置代理头
    proxy_set_header Host hitchily-nonemancipative-lizeth.ngrok-free.dev;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 关键配置：移除 ngrok 的 X-Frame-Options 限制
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;

    # 允许同源 iframe 嵌入
    add_header X-Frame-Options "SAMEORIGIN";

    # WebSocket 支持（如果需要）
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

# 配置完成后执行：
# sudo nginx -t  # 测试配置
# sudo systemctl reload nginx  # 重载配置
