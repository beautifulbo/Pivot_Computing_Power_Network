server {
    listen 80;
    server_name 82.157.104.186;

    # 客户端最大上传大小
    client_max_body_size 100M;

    # 前端静态文件
    location / {
        root /opt/system-template/frontend/dist;
        try_files $uri $uri/ /index.html;
        index index.html;

        # 禁用缓存（开发阶段）
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Swagger 文档代理（生产环境建议注释掉）
    location /doc.html {
        proxy_pass http://127.0.0.1:8090/doc.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /swagger-resources {
        proxy_pass http://127.0.0.1:8090/swagger-resources;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v2/api-docs {
        proxy_pass http://127.0.0.1:8090/v2/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webjars/ {
        proxy_pass http://127.0.0.1:8090/webjars/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 上传文件访问
    location /uploads/ {
        alias /opt/system-template/uploads/;
        autoindex off;
    }

    # 日志配置
    access_log /var/log/nginx/system-template-access.log;
    error_log /var/log/nginx/system-template-error.log;
}
