### rabbitmq
spring.rabbitmq.addresses=192.168.1.111
spring.rabbitmq.port=5672
spring.rabbitmq.username=turing
spring.rabbitmq.password=turing
###开启消息确认机制 confirms
spring.rabbitmq.virtual-host=/
#选择确认类型为交互
spring.rabbitmq.publisher-confirms=true
#开启发送消息失败回调
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.concurrency=1
spring.rabbitmq.listener.simple.max-concurrency=3
# 消费者预取1条数据到内存，默认为250条
spring.rabbitmq.listener.simple.prefetch=1
# 确定机制
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.template.receive-timeout=2000
spring.rabbitmq.template.reply-timeout=2000
