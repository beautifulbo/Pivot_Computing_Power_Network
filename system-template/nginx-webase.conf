# WeBase 反向代理配置
# 解决 iframe 嵌入跳转问题
#
# 使用方法：
# nginx -c H:\project\system-template\nginx-webase.conf
#
# 重载配置：
# nginx -s reload

# 设置工作进程数
worker_processes  1;

# 错误日志
error_log  logs/error.log;
error_log  logs/error.log  notice;
error_log  logs/error.log  info;

# PID 文件
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       C:/nginx/nginx-1.29.3/conf/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 上游服务器配置
    upstream webase_backend {
        server hitchily-nonemancipative-lizeth.ngrok-free.dev:443;
        keepalive 64;
    }

    upstream vue_frontend {
        server localhost:8084;
        keepalive 64;
    }

    upstream spring_backend {
        server localhost:8090;
        keepalive 64;
    }

    server {
        listen       80;
        server_name  localhost;

        # 字符集
        charset utf-8;

        # 访问日志
        access_log  logs/host.access.log  main;

        # 主应用代理到 Vue 开发服务器
        location / {
            proxy_pass http://vue_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持（用于 Vue 热更新）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 后端 API 代理
        location /api/ {
            proxy_pass http://spring_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WeBase 代理配置（关键部分）
        location /webase/ {
            # 代理到 ngrok（HTTPS）
            proxy_pass https://webase_backend/;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # 修改请求头
            proxy_set_header Host hitchily-nonemancipative-lizeth.ngrok-free.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 绕过 ngrok 警告
            proxy_set_header ngrok-skip-browser-warning "true";

            # 移除安全限制响应头（允许 iframe 嵌入）
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Frame-Options;

            # 添加允许 iframe 嵌入的头
            add_header X-Frame-Options "ALLOWALL" always;
            add_header Access-Control-Allow-Origin "*" always;

            # 关键：禁用响应压缩，以便 sub_filter 能正常工作
            proxy_set_header Accept-Encoding "";

            # 关键：使用 sub_filter 替换跳转代码
            # 替换所有可能导致页面跳转的 JavaScript 代码
            sub_filter 'window.top.location' 'window.self.location';
            sub_filter 'window.parent.location' 'window.self.location';
            sub_filter 'top.location.href' 'self.location.href';
            sub_filter 'parent.location.href' 'self.location.href';
            sub_filter 'top.location.replace' 'self.location.replace';
            sub_filter 'parent.location.replace' 'self.location.replace';
            sub_filter 'window.top.location.href' 'window.self.location.href';
            sub_filter 'window.parent.location.href' 'window.self.location.href';
            sub_filter 'window.top.location.replace' 'window.self.location.replace';
            sub_filter 'window.parent.location.replace' 'window.self.location.replace';
            sub_filter 'top.location.assign' 'self.location.assign';
            sub_filter 'parent.location.assign' 'self.location.assign';

            # 替换所有匹配项（不只是第一个）
            sub_filter_once off;

            # 对这些类型的文件进行替换
            sub_filter_types text/html text/css text/javascript application/javascript application/x-javascript text/xml application/xml;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
