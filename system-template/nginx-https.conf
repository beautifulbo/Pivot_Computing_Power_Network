# Nginx HTTPS 配置 - 适用于开发环境和可信生态与溯源模块
# 使用方法：nginx -c H:\project\system-template\nginx-https.conf
# 重载配置：nginx -s reload
# 停止服务：nginx -s stop

# 设置工作进程数
worker_processes  1;

# 错误日志（使用绝对路径）
error_log  C:/nginx/nginx-1.29.3/logs/error.log;
error_log  C:/nginx/nginx-1.29.3/logs/error.log  notice;
error_log  C:/nginx/nginx-1.29.3/logs/error.log  info;

# PID 文件（使用绝对路径）
pid        C:/nginx/nginx-1.29.3/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       C:/nginx/nginx-1.29.3/conf/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  C:/nginx/nginx-1.29.3/logs/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 临时文件路径（使用绝对路径）
    client_body_temp_path C:/nginx/nginx-1.29.3/temp/client_body_temp;
    proxy_temp_path C:/nginx/nginx-1.29.3/temp/proxy_temp;
    fastcgi_temp_path C:/nginx/nginx-1.29.3/temp/fastcgi_temp;
    uwsgi_temp_path C:/nginx/nginx-1.29.3/temp/uwsgi_temp;
    scgi_temp_path C:/nginx/nginx-1.29.3/temp/scgi_temp;

    # 上游服务器配置
    upstream vue_frontend {
        server localhost:8084;
        keepalive 64;
    }

    upstream spring_backend {
        server localhost:8090;
        keepalive 64;
    }

    # 第三方服务配置（可信生态与溯源等）
    upstream webase_backend {
        server hitchily-nonemancipative-lizeth.ngrok-free.dev:443;
        keepalive 64;
    }

    # 资源编排与调度服务
    upstream computing_trade_backend {
        server 82.157.104.186:8080;
        keepalive 64;
    }

    # HTTP 服务器 - 自动重定向到 HTTPS
    server {
        listen       80;
        server_name  localhost;

        # 重定向所有HTTP请求到HTTPS
        return 301 https://$server_name$request_uri;
    }

    # HTTPS 服务器
    server {
        listen       443 ssl;
        server_name  localhost;

        # SSL 证书配置
        ssl_certificate      H:/project/system-template/ssl/server.crt;
        ssl_certificate_key  H:/project/system-template/ssl/server.key;

        # SSL 协议和加密套件
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # SSL 会话缓存
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;

        # 字符集
        charset utf-8;

        # 访问日志
        access_log  C:/nginx/nginx-1.29.3/logs/https-access.log  main;

        # 客户端最大上传大小
        client_max_body_size 100M;

        # 主应用代理到 Vue 开发服务器
        location / {
            proxy_pass http://vue_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket 支持（用于 Vue 热更新）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 后端 API 代理
        location /api/ {
            proxy_pass http://spring_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Swagger 文档代理
        location /doc.html {
            proxy_pass http://spring_backend/doc.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /swagger-resources {
            proxy_pass http://spring_backend/swagger-resources;
            proxy_set_header Host $host;
        }

        location /v2/api-docs {
            proxy_pass http://spring_backend/v2/api-docs;
            proxy_set_header Host $host;
        }

        location /webjars/ {
            proxy_pass http://spring_backend/webjars/;
            proxy_set_header Host $host;
        }

        # WeBase 模块代理（可信生态与溯源）
        location /webase/ {
            # 代理到 ngrok（HTTPS）
            proxy_pass https://webase_backend/;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # 修改请求头
            proxy_set_header Host hitchily-nonemancipative-lizeth.ngrok-free.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # 绕过 ngrok 警告
            proxy_set_header ngrok-skip-browser-warning "true";

            # 移除安全限制响应头（允许 iframe 嵌入）
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Frame-Options;

            # 添加CORS头允许跨域
            add_header Access-Control-Allow-Origin "https://localhost" always;

            # 关键：禁用响应压缩，以便 sub_filter 能正常工作
            proxy_set_header Accept-Encoding "";

            # 关键：使用 sub_filter 替换跳转代码
            # 替换所有可能导致页面跳转的 JavaScript 代码
            sub_filter 'window.top.location' 'window.self.location';
            sub_filter 'window.parent.location' 'window.self.location';
            sub_filter 'top.location.href' 'self.location.href';
            sub_filter 'parent.location.href' 'self.location.href';
            sub_filter 'top.location.replace' 'self.location.replace';
            sub_filter 'parent.location.replace' 'self.location.replace';
            sub_filter 'window.top.location.href' 'window.self.location.href';
            sub_filter 'window.parent.location.href' 'window.self.location.href';
            sub_filter 'window.top.location.replace' 'window.self.location.replace';
            sub_filter 'window.parent.location.replace' 'self.location.replace';
            sub_filter 'top.location.assign' 'self.location.assign';
            sub_filter 'parent.location.assign' 'self.location.assign';

            # 替换所有匹配项（不只是第一个）
            sub_filter_once off;

            # 对这些类型的文件进行替换
            sub_filter_types text/css text/javascript application/javascript application/x-javascript text/xml application/xml;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # 资源编排与调度模块代理
        location /computing-trade/ {
            # 代理到资源编排服务器（HTTP）
            proxy_pass http://computing_trade_backend/;

            # 请求头
            proxy_set_header Host 82.157.104.186;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # 移除安全限制响应头（允许 iframe 嵌入）
            proxy_hide_header X-Frame-Options;
            proxy_hide_header x-frame-options;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Frame-Options;

            # 添加允许 iframe 嵌入的头
            add_header Access-Control-Allow-Origin "*" always;

            # 禁用响应压缩（以便 sub_filter 能正常工作）
            proxy_set_header Accept-Encoding "";

            # 使用 sub_filter 替换跳转代码，防止页面跳出iframe
            sub_filter 'window.top.location' 'window.self.location';
            sub_filter 'window.parent.location' 'window.self.location';
            sub_filter 'top.location.href' 'self.location.href';
            sub_filter 'parent.location.href' 'self.location.href';
            sub_filter 'window.top.location.href' 'window.self.location.href';
            sub_filter 'window.parent.location.href' 'window.self.location.href';
            sub_filter_once off;
            sub_filter_types text/css text/javascript application/javascript;

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # 通用第三方页面代理（可信生态与溯源）
        # 使用示例: /external/https/example.com/path
        location ~ ^/external/(https?)/(.*) {
            set $protocol $1;
            set $target_host $2;

            # 代理到目标HTTPS服务
            proxy_pass $protocol://$target_host;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # 请求头
            proxy_set_header Host $target_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # iframe 嵌入支持
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            add_header Access-Control-Allow-Origin "https://localhost" always;

            # 防止页面跳出 iframe
            proxy_set_header Accept-Encoding "";
            sub_filter 'window.top.location' 'window.self.location';
            sub_filter 'window.parent.location' 'window.self.location';
            sub_filter_once off;
            sub_filter_types text/javascript application/javascript;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
