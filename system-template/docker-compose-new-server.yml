version: '3.3'

services:
  # MySQL服务
  mysql:
    image: mysql:8.0.13
    container_name: system-template-mysql
    restart: always
    ports:
      - "3307:3306"  # 使用3307避免与现有MySQL冲突
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: system_template
      TZ: Asia/Shanghai
    volumes:
      - /opt/system-template/mysql/data:/var/lib/mysql
      - /opt/system-template/mysql/conf:/etc/mysql/conf.d
      - /opt/system-template/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - system-net

  # Redis服务
  redis:
    image: redis:6
    container_name: system-template-redis
    restart: always
    ports:
      - "6380:6379"  # 使用6380避免与现有Redis冲突
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /opt/system-template/redis/data:/data
    command: redis-server --appendonly yes --databases 16
    networks:
      - system-net

networks:
  system-net:
    driver: bridge
