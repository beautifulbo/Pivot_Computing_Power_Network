# Nginx配置文件 - iThings项目 (端口8080)
# 文件位置: /etc/nginx/sites-available/ithings-8080

server {
    listen 8080;
    server_name 82.157.104.186 _;

    root /var/www/ithings/dist;
    index index.html;

    # 支持前端路由 (hash mode)
    # 由于项目使用 hash 路由，所有路径都会重定向到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        text/x-component
        text/x-cross-domain-policy;

    # 安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 独立的日志文件（不影响其他项目）
    access_log /var/log/nginx/ithings-8080-access.log;
    error_log /var/log/nginx/ithings-8080-error.log;
}
