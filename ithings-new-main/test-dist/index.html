<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iThings - IoT管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #333;
            font-size: 48px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .status {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 10px 30px;
            border-radius: 25px;
            margin-top: 30px;
            font-weight: bold;
        }
        .info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        .info-item {
            margin: 15px 0;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 iThings</h1>
        <p>IoT 物联网管理平台</p>
        <div class="status">✓ 部署成功</div>

        <div class="info">
            <div class="info-item"><strong>服务器:</strong> 82.157.104.186</div>
            <div class="info-item"><strong>端口:</strong> 8080</div>
            <div class="info-item"><strong>访问地址:</strong> http://82.157.104.186:8080</div>
            <div class="info-item"><strong>状态:</strong> 正在运行</div>
        </div>
    </div>
</body>
</html>
